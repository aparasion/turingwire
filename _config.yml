title: "Turing Wire"
tagline: "AI news, research, and markets for practitioners."
description: "Daily AI briefing for engineers, researchers, and builders — curated news, paper summaries, and ecosystem market data."
url: "https://turingwire.com"
baseurl: ""

# Build
markdown: kramdown
highlighter: rouge
permalink: /post/:year/:month/:day/:slug/
timezone: UTC

# Kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Pagination (jekyll-paginate)
paginate: 20
paginate_path: "/page/:num/"

# Collections
collections:
  companies:
    output: true
    permalink: /companies/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: "pages"
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "companies"
    values:
      layout: "company"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CONTRIBUTING.md
  - scripts/
  - feeds/
  - requirements.txt
  - "*.py"
  - ".github/"
  - node_modules/
  - vendor/
  - archive/

# Include
include:
  - _pages
  - CNAME

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from

# jekyll-feed
feed:
  path: feed.xml
  posts_limit: 50

# SEO
logo: "/assets/images/logo.png"
social:
  name: "Turing Wire"
  links: []

# Author
author:
  name: "Turing Wire"
  url: "https://turingwire.com"

# Analytics placeholder (fill in after launch)
google_analytics: ""

# Contact form (Formspree — register at formspree.io, create a form, then paste the endpoint below)
contact_form_action: "https://formspree.io/f/928f224b-ed45-409c-9f1e-bf802e47623c"

# Site-wide flags
ai_index_base_date: "2026-01-02"
ai_index_name: "TW AI Index"
max_posts_per_run: 50
post_archive_after_days: 90
