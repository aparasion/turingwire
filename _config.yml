title: "Turing Wire"
tagline: "AI news, research, and markets for practitioners."
description: "The essential daily briefing for AI engineers, researchers, and builders — in-depth news coverage, research analysis, and ecosystem market data."
url: "https://turingwire.com"
baseurl: ""

# Build
markdown: kramdown
highlighter: rouge
permalink: /post/:year/:month/:day/:slug/
timezone: UTC

# Kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Pagination (jekyll-paginate)
paginate: 20
paginate_path: "/page/:num/"

# Collections
collections:
  companies:
    output: true
    permalink: /companies/:name/
  stories:
    output: true
    permalink: /story/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      sitemap: true
  - scope:
      path: "pages"
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "companies"
    values:
      layout: "company"
  - scope:
      path: ""
      type: "stories"
    values:
      layout: "story"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CONTRIBUTING.md
  - scripts/
  - feeds/
  - requirements.txt
  - "*.py"
  - ".github/"
  - node_modules/
  - vendor/
  - archive/
  - docs/

# Include
include:
  - _pages
  - CNAME

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from

# jekyll-feed
feed:
  path: feed.xml
  posts_limit: 50

# SEO
logo: "/assets/img/turingwirelogo.png"
social:
  name: "Turing Wire"
  links: []

# Author
author:
  name: "Turing Wire"
  url: "https://turingwire.com"

# Editorial identity (E-E-A-T) — named editor persona used for bylines and Person schema.
# TODO(owner): replace `name`/`bio` with your preferred pen name and a true description.
editor:
  name: "Callan Zhang"
  role: "Founder & Editor"
  url: "/about/editor/"
  bio: "Callan Zhang is the pen name of the founder and editor of Turing Wire, an AI practitioner who builds and maintains the publication."

# Publication identity (E-E-A-T) — drives NewsMediaOrganization schema.
organization:
  name: "Turing Wire"
  legal_name: "Turing Wire"
  founding_date: "2026"
  # Add real, verified profile URLs (X, LinkedIn, GitHub, etc.) to strengthen authority.
  same_as: []

# Search Console — paste the verification token after launch (leave blank to omit the tag).
google_site_verification: ""

# Newsletter capture — set `action` to your provider's form endpoint
# (e.g. Buttondown/Substack/Mailchimp) to render the signup block. Blank = hidden.
newsletter:
  action: ""
  email_field: "email"
  placeholder: "you@example.com"

# Analytics placeholder (fill in after launch)
google_analytics: ""

# Site-wide flags
ai_index_base_date: "2026-01-02"
ai_index_name: "TW AI Index"
max_posts_per_run: 50
post_archive_after_days: 90
