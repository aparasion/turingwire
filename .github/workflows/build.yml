name: build (auto + manual)

on:
  # Trigger after ingest or stocks succeed
  workflow_run:
    workflows: ["ingest (auto + manual)", "stocks (auto + manual)"]
    types: [completed]
    branches: [main]
  # Trigger on direct pushes to site content (manual adjustments)
  push:
    branches: [main]
    paths:
      - '_posts/**'
      - '_companies/**'
      - '_stories/**'
      - '_data/**'
      - '_layouts/**'
      - '_includes/**'
      - '_config.yml'
      - 'Gemfile'
  # Daily safety-net rebuild
  schedule:
    - cron: "0 6 * * *"
  # Manual trigger
  workflow_dispatch:

# Required for GitHub Pages Actions deployment
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Only run if triggering workflow succeeded (or triggered manually/by schedule)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Check data freshness
        run: |
          SNAPSHOT="_data/stocks_snapshot.json"
          if [ -f "$SNAPSHOT" ]; then
            python3 -c "
          import json, sys
          from datetime import datetime, timezone, timedelta
          with open('$SNAPSHOT') as f:
              data = json.load(f)
          updated = data.get('updated_at', '')
          if not updated:
              sys.exit(0)
          dt = datetime.fromisoformat(updated.replace('Z', '+00:00'))
          age = datetime.now(timezone.utc) - dt
          print(f'Stocks data age: {age}')
          if age > timedelta(hours=6):
              print('WARNING: stocks data is stale')
          "
          fi

      # configure-pages sets JEKYLL_ENV and writes the correct baseurl/url
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build --destination _site
        env:
          JEKYLL_ENV: production

      - name: Install and run Pagefind
        run: |
          npm install -g pagefind
          pagefind --site _site --output-path _site/pagefind

      # Upload the built _site as a Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
