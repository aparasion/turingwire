name: Seed AI Index History

on:
  workflow_dispatch:
    inputs:
      base_date:
        description: "Index base date (YYYY-MM-DD)"
        required: false
        default: "2025-01-02"

permissions:
  contents: write

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pyyaml

      - name: Seed index history
        run: |
          python scripts/seed_index_history.py --base-date "${{ github.event.inputs.base_date }}"

      - name: Commit history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/ai_index_history.json
          git diff --cached --quiet || git commit -m "chore: seed AI index history from ${{ github.event.inputs.base_date }} [skip ci]"
          git push
