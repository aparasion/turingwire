name: stocks (auto + manual)

on:
  schedule:
    # Every 15 min during US market hours (13:30–20:30 UTC = 9:30am–4:30pm ET)
    - cron: "*/15 13-20 * * 1-5"
    # Extra run at 21:00 UTC for close prices
    - cron: "0 21 * * 1-5"
    # Weekend safety-net to keep data fresh
    - cron: "0 16 * * 0,6"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  fetch-stocks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Mask secrets
        run: echo "::add-mask::${{ secrets.FINNHUB_API_KEY }}"

      - name: Fetch stock quotes
        run: python scripts/fetch_stocks.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: Compute AI Index
        run: python scripts/compute_ai_index.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/stocks_snapshot.json _data/ai_index_history.json
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "chore(stocks): update snapshot [skip ci]"
          for attempt in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && break
            echo "push attempt $attempt failed, retrying..."
            sleep $((attempt * 3))
          done

  notify-on-failure:
    needs: fetch-stocks
    if: failure()
    uses: ./.github/workflows/issue-on-failure.yml
    with:
      workflow_name: "stocks"
      run_id: ${{ github.run_id }}
    secrets: inherit
