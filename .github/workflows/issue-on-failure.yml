name: issue-on-failure [reusable]

on:
  workflow_call:
    inputs:
      workflow_name:
        type: string
        required: true
      run_id:
        type: string
        required: true

permissions:
  issues: write

jobs:
  open-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Get workflow run logs URL
        id: logs
        run: |
          echo "url=https://github.com/${{ github.repository }}/actions/runs/${{ inputs.run_id }}" >> $GITHUB_OUTPUT

      - name: Check for existing open failure issue
        id: existing
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['pipeline-failure'],
            });
            const existing = issues.data.find(i =>
              i.title.includes('${{ inputs.workflow_name }}')
            );
            if (existing) {
              core.setOutput('issue_number', existing.number);
              core.setOutput('exists', 'true');
            } else {
              core.setOutput('exists', 'false');
            }

      - name: Create failure issue
        if: steps.existing.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `pipeline failure: ${{ inputs.workflow_name }} ${date}`,
              body: [
                '## Pipeline Failure',
                '',
                `**Workflow:** \`${{ inputs.workflow_name }}\``,
                `**Run:** [#${{ inputs.run_id }}](${{ steps.logs.outputs.url }})`,
                `**Date:** ${date}`,
                '',
                '### How to investigate',
                '',
                '1. Click the run link above to see the full workflow log.',
                '2. Check the **pipeline-artifacts** artifact for `run_log.json` and `review_queue.json`.',
                '3. Re-run the workflow manually from the Actions tab once the issue is resolved.',
                '',
                '_This issue will be auto-closed when the next successful run completes._',
              ].join('\n'),
              labels: ['pipeline-failure', 'automated'],
            });

      - name: Update existing issue
        if: steps.existing.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.existing.outputs.issue_number }},
              body: `Another failure at ${date}. [Run #${{ inputs.run_id }}](${{ steps.logs.outputs.url }})`,
            });
