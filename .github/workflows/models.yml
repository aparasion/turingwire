name: models

on:
  schedule:
    # Daily at 08:00 UTC
    - cron: "0 8 * * *"
  # Also trigger after every ingest run so new pricing news is checked promptly
  workflow_run:
    workflows: ["ingest"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-model-pricing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.OPENAI_API_KEY }}"

      - name: Check for pricing changes
        run: python scripts/fetch_models.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        # Exit code 1 = pricing change detected → triggers issue-on-failure
        continue-on-error: true
        id: pricing_check

      - name: Flag pricing change via issue
        if: steps.pricing_check.outcome == 'failure'
        uses: ./.github/workflows/issue-on-failure.yml
        with:
          workflow_name: "models — pricing change detected"
          run_id: ${{ github.run_id }}
        secrets: inherit

  notify-on-failure:
    needs: check-model-pricing
    if: failure()
    uses: ./.github/workflows/issue-on-failure.yml
    with:
      workflow_name: "models"
      run_id: ${{ github.run_id }}
    secrets: inherit
