name: ingest (auto + manual)

on:
  schedule:
    # Hourly at :17 past the hour (offset to reduce GitHub Actions queue contention)
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch only, no LLM calls or post writes)"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.OPENAI_API_KEY }}"

      - name: Fetch feeds
        run: python scripts/fetch_feeds.py ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Deduplicate
        if: github.event.inputs.dry_run != 'true'
        run: python scripts/deduplicate.py

      - name: Classify articles
        if: github.event.inputs.dry_run != 'true'
        run: python scripts/classify_article.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Tag companies
        if: github.event.inputs.dry_run != 'true'
        run: python scripts/tag_company.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Summarize news
        if: github.event.inputs.dry_run != 'true'
        run: python scripts/summarize_news.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Upgrade summary quality by setting repo variable SUMMARIZER_MODEL (e.g. gpt-4o).
          SUMMARIZER_MODEL: ${{ vars.SUMMARIZER_MODEL || 'gpt-4o-mini' }}

      - name: Summarize research
        if: github.event.inputs.dry_run != 'true'
        run: python scripts/summarize_research.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUMMARIZER_MODEL: ${{ vars.SUMMARIZER_MODEL || 'gpt-4o-mini' }}

      - name: Generate company pages
        if: github.event.inputs.dry_run != 'true'
        run: python scripts/generate_company_pages.py

      - name: Upload operational artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifacts-${{ github.run_id }}
          path: |
            _data/run_log.json
            _data/review_queue.json
            _data/backlog.json
            _data/staging_articles.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Count new posts
        if: github.event.inputs.dry_run != 'true'
        id: count
        run: |
          COUNT=$(git status --short _posts/ | grep "^?" | wc -l || echo 0)
          echo "new_posts=$COUNT" >> $GITHUB_OUTPUT

      - name: Commit new posts and updated data
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ _companies/ _data/seen_articles.json _data/etag_cache.json || true
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "chore(ingest): ${{ steps.count.outputs.new_posts }} new posts [skip ci]"
          # Retry push up to 4 times with rebase to handle concurrent pipeline runs
          for attempt in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && break
            echo "push attempt $attempt failed, retrying..."
            sleep $((attempt * 3))
          done

    # Notify on failure via issue-on-failure workflow
    outputs:
      job_status: ${{ job.status }}

  notify-on-failure:
    needs: ingest
    if: failure()
    uses: ./.github/workflows/issue-on-failure.yml
    with:
      workflow_name: "ingest"
      run_id: ${{ github.run_id }}
    secrets: inherit
