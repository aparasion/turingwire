name: archive [auto + manual]

on:
  schedule:
    # Run monthly on the 1st at 03:00 UTC
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install PyYAML python-dateutil

      - name: Run archive
        run: python scripts/archive_posts.py

      - name: Check repo size
        run: |
          SIZE=$(du -sh . --exclude=.git | cut -f1)
          echo "Repo size (excluding .git): $SIZE"
          # Warn if > 400 MB
          SIZE_MB=$(du -sm . --exclude=.git | cut -f1)
          if [ "$SIZE_MB" -gt 400 ]; then
            echo "::warning::Repo size is ${SIZE_MB}MB — approaching 500MB threshold"
          fi

      - name: Commit archived posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/ _posts/
          git diff --cached --quiet && echo "nothing to archive" && exit 0
          git commit -m "chore(archive): compress posts older than 90 days [skip ci]"
          git push origin main
