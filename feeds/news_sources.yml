  # ── Tier 3: Aggregators ───────────────────────────────────────────────────
  - name: "Hacker News (AI filtered)"
    url: "https://hnrss.org/newest?q=artificial+intelligence+OR+LLM+OR+machine+learning&points=100"
    type: rss
    category_hint: news
    requires_full_text_fetch: true
    priority: 3
    notes: "Only items with score >= 100. Fetch full linked article text."

  # ── Google News: companies without official RSS ───────────────────────────
  # Queries use quoted phrases + topic words to minimise noise.
  # resolve_redirect: true instructs the fetcher to follow Google's redirect
  # URLs to canonical article URLs before storing, so URL-based dedup works.

  - name: "Google News · xAI / Grok"
    url: "https://news.google.com/rss/search?q=%22xAI%22+%28Grok+OR+model+OR+API+OR+release+OR+safety+OR+benchmark+OR+reasoning%29&hl=en-US&gl=US&ceid=US:en"
    type: rss
    category_hint: news
    requires_full_text_fetch: true
    resolve_redirect: true
    priority: 1
    company: "xAI"
    notes: "Google News proxy for xAI/Grok — no official RSS. Redirect resolved to source URL."

  - name: "Google News · DeepSeek"
    url: "https://news.google.com/rss/search?q=%22DeepSeek%22+%28AI+OR+model+OR+LLM+OR+research+OR+reasoning+OR+release+OR+benchmark%29&hl=en-US&gl=US&ceid=US:en"
    type: rss
    category_hint: news
    requires_full_text_fetch: true
    resolve_redirect: true
    priority: 1
    company: "DeepSeek"
    notes: "Google News proxy for DeepSeek — no official RSS. Redirect resolved to source URL."

  - name: "Google News · MiniMax"
    url: "https://news.google.com/rss/search?q=%22MiniMax+AI%22+OR+%22Hailuo+AI%22+OR+%28%22MiniMax%22+%28model+OR+video+OR+AI+OR+chatbot+OR+release%29%29&hl=en-US&gl=US&ceid=US:en"
    type: rss
    category_hint: news
    requires_full_text_fetch: true
    resolve_redirect: true
    priority: 1
    company: "MiniMax"
    notes: "Google News proxy for MiniMax/Hailuo — no official RSS. Redirect resolved to source URL."
