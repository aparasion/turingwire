# News feed sources
# Fields: name, url, type (rss|atom|api), category_hint, requires_full_text_fetch, priority (1-3)
# priority 1 = highest (major AI labs / hardware vendors)
# priority 2 = mid-tier publications
# priority 3 = aggregators / filtered feeds

