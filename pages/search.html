---
layout: default
title: "Search"
description: "Search Turing Wire articles"
permalink: /search/
---

<!-- Pagefind UI -->
<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<script src="/pagefind/pagefind-ui.js"></script>

<div class="max-w-2xl mx-auto px-4 sm:px-6 py-10">

  <div class="mb-6">
    <h1 class="text-xl font-semibold tw-heading font-mono">Search</h1>
    <p class="text-xs tw-muted mt-1">News, research, and companies</p>
  </div>

  <div id="search-container"></div>

  <!-- Category pills — revealed once results appear -->
  <div id="category-pills" style="display:none" class="flex flex-wrap gap-2 mt-5 pt-4 border-t tw-border">
    <button class="tw-filter-chip active" data-filter="all">All</button>
    <button class="tw-filter-chip" data-filter="news">News</button>
    <button class="tw-filter-chip" data-filter="research">Research</button>
    <button class="tw-filter-chip" data-filter="companies">Companies</button>
  </div>

</div>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var query = params.get('q') || '';
  var activeFilter = 'all';
  var pillsShown = false;

  function getCategoryFromHref(href) {
    if (!href) return 'other';
    if (href.includes('/news/'))      return 'news';
    if (href.includes('/research/'))  return 'research';
    if (href.includes('/companies/')) return 'companies';
    return 'other';
  }

  function applyFilter() {
    var results = document.querySelectorAll('.pagefind-ui__result');
    if (!results.length) return;

    results.forEach(function (r) {
      var link = r.querySelector('a');
      var href = link ? (link.getAttribute('href') || '') : '';
      var cat  = getCategoryFromHref(href);
      var show = activeFilter === 'all' || cat === activeFilter;
      r.style.display = show ? '' : 'none';
    });

    if (!pillsShown) {
      document.getElementById('category-pills').style.display = 'flex';
      pillsShown = true;
    }
  }

  function watchResults() {
    var container = document.getElementById('search-container');
    if (!container) { setTimeout(watchResults, 100); return; }
    var observer = new MutationObserver(function () { applyFilter(); });
    observer.observe(container, { childList: true, subtree: true });
  }

  function initSearch() {
    if (typeof PagefindUI === 'undefined') { setTimeout(initSearch, 50); return; }

    new PagefindUI({
      element: '#search-container',
      showSubResults: false,
      excerptLength: 22,
      defaultQuery: query,
    });

    if (query) {
      var attempts = 0;
      function trigger() {
        var input = document.querySelector('.pagefind-ui__search-input');
        if (input) {
          input.value = query;
          input.dispatchEvent(new Event('input', { bubbles: true }));
        } else if (attempts++ < 30) {
          setTimeout(trigger, 100);
        }
      }
      setTimeout(trigger, 100);
    }

    watchResults();
  }

  document.addEventListener('click', function (e) {
    var chip = e.target.closest('[data-filter]');
    if (!chip) return;
    activeFilter = chip.dataset.filter;
    document.querySelectorAll('[data-filter]').forEach(function (c) {
      c.classList.toggle('active', c === chip);
    });
    applyFilter();
  });

  if (document.readyState !== 'loading') {
    initSearch();
  } else {
    document.addEventListener('DOMContentLoaded', initSearch);
  }
})();
</script>

<style>
  /* ── Search form ── */
  .pagefind-ui__form { margin-bottom: 0; }

  .pagefind-ui__search-input {
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 13px !important;
    height: 38px !important;
    padding: 0 2.5rem 0 0.875rem !important;
    border-radius: 6px !important;
    background: var(--bg-card) !important;
    border: 1px solid var(--border) !important;
    color: var(--fg) !important;
    box-shadow: none !important;
    transition: border-color 0.15s !important;
  }
  .pagefind-ui__search-input:focus {
    border-color: var(--accent) !important;
    outline: none !important;
  }
  .pagefind-ui__search-input::placeholder {
    color: var(--fg-muted) !important;
    opacity: 0.7 !important;
  }

  .pagefind-ui__search-clear {
    top: 50% !important;
    transform: translateY(-50%) !important;
    right: 8px !important;
    opacity: 0.5;
  }
  .pagefind-ui__search-clear:hover { opacity: 1; }

  /* ── Results layout ── */
  .pagefind-ui__results-area { margin-top: 6px; }
  .pagefind-ui__results      { gap: 0; list-style: none; padding: 0; margin: 0; }

  /* ── Hide per-result thumbnails ── */
  .pagefind-ui__result-thumb { display: none !important; }

  /* ── Result row ── */
  .pagefind-ui__result {
    padding: 12px 0 !important;
    border-bottom: 1px solid var(--border) !important;
    border-radius: 0 !important;
    background: transparent !important;
  }
  .pagefind-ui__result:last-child { border-bottom: none !important; }

  .pagefind-ui__result-inner {
    padding: 0 !important;
    gap: 0 !important;
    display: flex !important;
    flex-direction: column !important;
  }
  .pagefind-ui__result-link   { padding: 0 !important; }
  .pagefind-ui__result-nested { padding: 3px 0 0 10px !important; }

  /* ── Title ── */
  .pagefind-ui__result-title {
    font-size: 14px !important;
    font-weight: 600 !important;
    line-height: 1.35 !important;
    color: var(--fg-heading) !important;
  }
  .pagefind-ui__result-title a {
    color: inherit !important;
    text-decoration: none !important;
    transition: color 0.15s;
  }
  .pagefind-ui__result-title a:hover { color: var(--accent) !important; }

  /* ── URL hint ── */
  .pagefind-ui__result-link-hint {
    font-size: 10px !important;
    font-family: 'JetBrains Mono', monospace !important;
    color: var(--fg-muted) !important;
    opacity: 0.6 !important;
    margin-top: 2px !important;
    display: block;
  }

  /* ── Excerpt ── */
  .pagefind-ui__result-excerpt {
    font-size: 12px !important;
    line-height: 1.55 !important;
    margin-top: 4px !important;
    color: var(--fg-muted) !important;
    opacity: 1 !important;
  }
  .pagefind-ui__result-excerpt mark {
    background: color-mix(in srgb, var(--accent) 14%, transparent);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 2px;
    font-weight: 500;
  }

  /* ── Message / count ── */
  .pagefind-ui__message {
    font-size: 11px !important;
    font-family: 'JetBrains Mono', monospace !important;
    color: var(--fg-muted) !important;
    padding: 6px 0 !important;
  }
  .pagefind-ui__results-count {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--fg-muted);
    opacity: 0.7;
    margin-bottom: 4px;
    display: block;
  }

  /* ── Load more ── */
  .pagefind-ui__suppressed { display: none !important; }
  .pagefind-ui__button {
    margin-top: 14px !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 11px !important;
    padding: 5px 14px !important;
    border-radius: 6px !important;
    border: 1px solid var(--border) !important;
    background: transparent !important;
    color: var(--fg-muted) !important;
    cursor: pointer !important;
    transition: border-color 0.15s, color 0.15s !important;
  }
  .pagefind-ui__button:hover {
    border-color: var(--accent) !important;
    color: var(--accent) !important;
    background: color-mix(in srgb, var(--accent) 6%, transparent) !important;
  }
</style>
