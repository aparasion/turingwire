---
layout: default
title: "Search"
description: "Search Turing Wire articles"
permalink: /search/
---

<!-- Pagefind UI -->
<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<script src="/pagefind/pagefind-ui.js"></script>

<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

  <header class="mb-6">
    <h1 class="text-2xl font-semibold tw-heading">Search</h1>
  </header>

  <div id="search-container"></div>

</div>

<script>
  window.addEventListener('DOMContentLoaded', function () {
    var params = new URLSearchParams(window.location.search);
    var query = params.get('q') || '';

    new PagefindUI({
      element: '#search-container',
      showSubResults: false,
      excerptLength: 15,
      defaultQuery: query,
    });

    if (query) {
      setTimeout(function () {
        var input = document.querySelector('.pagefind-ui__search-input');
        if (input) {
          input.dispatchEvent(new Event('input', { bubbles: true }));
        }
      }, 50);
    }
  });
</script>

<style>
  .pagefind-ui__search-input { font-family: 'JetBrains Mono', monospace; font-size: 14px; }
  .pagefind-ui__results { margin-top: 12px; }
  .pagefind-ui__result { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .pagefind-ui__result-inner { margin: 0; }
  .pagefind-ui__result-title { font-size: 13px; font-weight: 600; color: var(--fg-heading); }
  .pagefind-ui__result-excerpt { font-size: 12px; margin-top: 2px; line-height: 1.4; }
  .pagefind-ui__result-excerpt mark {
    background: color-mix(in srgb, var(--accent) 20%, transparent);
    color: var(--accent);
    border-radius: 2px;
  }
  .pagefind-ui__result-link { padding: 0; }
  .pagefind-ui__message { font-size: 12px; font-family: 'JetBrains Mono', monospace; }
  .pagefind-ui__search-clear { top: 50%; transform: translateY(-50%); }
</style>
