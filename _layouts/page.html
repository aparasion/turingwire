---
layout: default
---
<div class="max-w-3xl mx-auto px-4 pt-[25px] pb-10 sm:px-6 lg:px-8">
  <header class="mb-8">
    <h1 class="text-3xl font-semibold tw-heading">{{ page.title }}</h1>
    {% if page.description %}
    <p class="mt-2 tw-muted">{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="tw-prose prose-page">
    {{ content }}
  </div>
</div>
